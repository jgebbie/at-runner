name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prek:
    name: Prek (hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: j178/prek-action@v2

  rust:
    name: Rust workspace (clippy, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: cargo build
        run: cargo build --release --workspace

      # Client integration tests need a live server; compile them only (matches previous CI).
      - name: cargo test
        run: |
          cargo test -p at-runner
          cargo test -p at-test-driver
          cargo test -p at-runner-client --no-run

  python-client:
    name: Python client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install package (editable)
        run: pip install -e './client/python[dev]'

      - name: Byte-compile sources
        run: python -m compileall -q client/python/src

      - name: Build and check package
        run: |
          python -m pip install --upgrade build twine
          python -m build client/python
          python -m twine check client/python/dist/*
