name: Release

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "OCI tag to publish (e.g. v0.2.0). Required for manual runs."
        required: true
        type: string
      at_image:
        description: "AT base image (Dockerfile build-arg AT_IMAGE)"
        required: true
        default: ghcr.io/jgebbie/at:at_2026_2_2
        type: string
      push_latest:
        description: "Also push the latest tag (only if this build should become the default latest)"
        required: false
        default: false
        type: boolean
      publish_python:
        description: "Also publish the Python client to PyPI"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    env:
      # Default for tag-push releases; workflow_dispatch overwrites via the step below.
      AT_IMAGE: ghcr.io/jgebbie/at:at_2026_2_2
    steps:
      - uses: actions/checkout@v7

      - name: Set AT_IMAGE from workflow inputs
        if: github.event_name == 'workflow_dispatch'
        run: echo "AT_IMAGE=${{ inputs.at_image }}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # type=ref,event=tag only applies to push events with a tag ref — not workflow_dispatch.
      - name: Docker metadata (git tag release)
        id: meta_push
        if: github.event_name == 'push'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Docker metadata (manual)
        id: meta_dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ inputs.push_latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            AT_IMAGE=${{ env.AT_IMAGE }}
          tags: ${{ steps.meta_push.outputs.tags || steps.meta_dispatch.outputs.tags }}
          labels: ${{ steps.meta_push.outputs.labels || steps.meta_dispatch.outputs.labels }}

      - name: Verify anonymous GHCR access
        run: |
          docker logout ghcr.io || true
          tag="$(printf '%s\n' "${{ steps.meta_push.outputs.tags || steps.meta_dispatch.outputs.tags }}" | head -n 1)"
          if ! docker buildx imagetools inspect "$tag"; then
            echo "::error::Anonymous GHCR access failed for $tag. Set the package visibility to Public in the GitHub package settings, then rerun this workflow."
            exit 1
          fi

  python-client:
    name: Build & publish Python client to PyPI
    if: github.event_name == 'push' || inputs.publish_python
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/oalib-at-runner/
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build Python client distributions
        run: python -m build client/python

      - name: Check Python client distributions
        run: python -m twine check client/python/dist/*

      - name: Upload Python client distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-client-dist
          path: client/python/dist/*

      - name: Publish Python client to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: client/python/dist/
